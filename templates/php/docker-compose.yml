services:
  devcontainer:
    build:
      context: .
      args:
        TZ: ${TZ:-Europe/London}
        NODE_VERSION: "24"
        GIT_DELTA_VERSION: "0.18.2"
        WP_CLI_VERSION: "2.10.0"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ..:__WORKSPACE_FOLDER__:cached
      - __WORKSPACE_FOLDER__/.devcontainer/.data/proxy # anonymous volume hides proxy credentials inside the container
      - ./.data/history:/commandhistory
      - ./.data/claude:/home/vscode/.claude
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: /home/vscode/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      EXTRA_ALLOWED_DOMAINS: "packagist.org repo.packagist.org api.wordpress.org downloads.wordpress.org getcomposer.org"
      ANTHROPIC_API_KEY: "proxy-handled" # replaced by the sidecar proxy
      ANTHROPIC_BASE_URL: "http://claude-proxy:3100"
    depends_on:
      claude-proxy:
        condition: service_healthy
    command: sleep infinity

  claude-proxy:
    build:
      context: ./proxy
    volumes:
      - ./.data/proxy:/data
    restart: unless-stopped
    environment:
      CREDENTIALS_FILE: /data/credentials.json
      PORT: "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
