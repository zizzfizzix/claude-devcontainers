services:
  devcontainer:
    build:
      context: .
      args:
        TZ: ${TZ:-Europe/London}
        GIT_DELTA_VERSION: "0.18.2"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      # Bind mounts into .devcontainer/.data/ keep all state local to the project.
      # The .data/ directory is gitignored by install.sh.
      - ..:__WORKSPACE_FOLDER__:cached
      - __WORKSPACE_FOLDER__/.devcontainer/.data/proxy # anonymous volume shadows real credentials
      - ./.data/history:/commandhistory
      - ./.data/claude:/home/node/.claude
      - ./.data/certs:/proxy-certs:ro
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      NODE_EXTRA_CA_CERTS: "/proxy-certs/mitmca.pem"
      CLAUDE_CONFIG_DIR: /home/node/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      SSL_CERT_FILE: "/etc/ssl/certs/ca-certificates.crt"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
    depends_on:
      claude-proxy:
        condition: service_healthy
    # VS Code overrides this — it's here so plain `docker compose up` doesn't exit.
    command: sleep infinity

  claude-proxy:
    build:
      context: ./proxy
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./.data/proxy:/data
      - ./.data/certs:/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3100/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
